services:
  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3114:3114"
      - "3113:3113"
    volumes:
      - agentmemory-data:/data
    env_file: .env
    environment:
      AGENTMEMORY_TOOLS: all
      AGENTMEMORY_SECRET_FILE: /data/.hmac
      III_ENGINE_URL: ws://127.0.0.1:49134
      III_REST_PORT: "3111"
      AGENTMEMORY_MCP_PORT: "3114"
      AGENTMEMORY_REST_HOST: "127.0.0.1"
      AGENTMEMORY_VIEWER_HOST: "0.0.0.0"
      VIEWER_ALLOWED_HOSTS: "${VIEWER_ALLOWED_HOSTS:-localhost:3113,127.0.0.1:3113}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3111/agentmemory/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agentmemory-data:
