services:
  iii-init:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - iii-data:/data
    entrypoint: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"

  iii-engine:
    image: iiidev/iii:${AGENTMEMORY_III_VERSION:-0.11.2}
    user: "65532:65532"
    depends_on:
      iii-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:49134:49134"
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3112:3112"
      - "127.0.0.1:9464:9464"
    volumes:
      - iii-data:/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3111/agentmemory/livez"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      iii-engine:
        condition: service_healthy
    ports:
      - "127.0.0.1:3114:3114"
      - "127.0.0.1:3113:3113"
    volumes:
      - iii-data:/data
    environment:
      AGENTMEMORY_TOOLS: all
      AGENTMEMORY_SECRET_FILE: /data/.hmac
      III_ENGINE_URL: ws://iii-engine:49134
      III_REST_PORT: "3111"
      AGENTMEMORY_MCP_PORT: "3114"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3111/agentmemory/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  iii-data:
